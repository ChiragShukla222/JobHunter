name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate package.json
        run: npm run --dry-run start || true
      
      - name: Check for syntax errors
        run: node --check server.js
      
      - name: Verify server can start
        run: |
          timeout 5 npm start || true
        env:
          PORT: 3000

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check code formatting (basic)
        run: |
          # Check for common issues
          if grep -r "console.log" src/ server.js 2>/dev/null; then
            echo "Warning: console.log statements found. Consider removing for production."
          fi
          echo "Basic linting check passed"

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate Vercel configuration
        run: |
          if [ -f vercel.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('vercel.json', 'utf8'))"
            echo "✓ vercel.json is valid"
          fi
      
      - name: Check required files exist
        run: |
          test -f server.js || (echo "server.js not found" && exit 1)
          test -f package.json || (echo "package.json not found" && exit 1)
          echo "✓ Required files exist"



